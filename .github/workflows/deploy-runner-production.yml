# Deploys both halves of the autoship-runner together on every push to main:
#   1. The Vercel webhook receiver (packages/runner/api/webhooks/linear.ts), and
#   2. The trigger.dev worker (packages/runner/src/trigger/).
#
# They must stay in lockstep — a tag/key schema change on one half silently
# breaks the other if only one redeploys. This workflow guarantees both
# deploy from the same commit, or neither does.
#
# History: the previous setup leaned on Vercel's GitHub App for the webhook
# half (a separate trigger-deploy.yml deployed the worker half). The Vercel
# App wasn't authorized on this repo, so webhook-side changes silently
# failed to land in prod. The mismatch surfaced when a stable-key idempotency
# bug was fixed on the worker side but the webhook still searched by the
# old key — comments hit the new tokens, found nothing, returned 202 ignored.
# See run_cmp22c1jn40nh0iofe9r16kp0 for the postmortem trace.
#
# Required GitHub secret:
#   TRIGGER_ACCESS_TOKEN — trigger.dev Personal Access Token (Account →
#                          Personal Access Tokens). Distinct from the
#                          runtime tr_prod_* secret key the receiver uses.
#   VERCEL_TOKEN         — Vercel Account → Tokens.
#
# The Vercel org/project IDs are non-secret identifiers (like the
# trigger.dev project ref), so they're hardcoded here for reproducibility
# rather than passed through Secrets.
#
# Deploy order: Vercel webhook first, then trigger.dev worker. The webhook
# is the entry point — shipping a backward-compatible webhook first lets
# in-flight events keep flowing while the worker catches up. For
# backward-INCOMPATIBLE run-payload changes, this order is still safer
# than the reverse: the worker only sees the new payload shape after the
# webhook is updated to emit it.
#
# Cloud Run standby (deploy-runner-cloud-run.yml) is intentionally a
# separate workflow — it's a failover target, not a tied deploy.
name: Deploy runner to production

on:
  push:
    branches: [main]
    paths:
      - 'packages/runner/**'
      - '.github/workflows/deploy-runner-production.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VERCEL_ORG_ID: team_tBZE0Fwf7oYg2cn1Ws60jLAG
  VERCEL_PROJECT_ID: prj_riFKRtmIFQzOHUZVSAN8c6Oabu6D

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Install runner deps inside packages/runner/ (not from monorepo root)
      # so packages/runner/node_modules is populated. Workspace hoisting at
      # the root puts deps in ../../node_modules, which Vercel's per-package
      # bundler can't find — `vercel build` then tries to install on its own
      # and fails with `spawn npm ENOENT`. This is also the install path
      # Docker uses (Dockerfile COPY package-lock.json + npm ci), so CI and
      # production install identically and can't drift.
      #
      # The monorepo root npm workspaces setup is for human dev; deploy CI
      # treats each package as standalone.
      - name: Install runner dependencies (package-local)
        working-directory: packages/runner
        # --no-workspaces is required: npm always hoists to monorepo root
        # otherwise (it ignores nested .npmrc workspaces=false and the env
        # var conflicts with --workspace). This flag explicitly says
        # "treat this as standalone." Uses packages/runner/package-lock.json.
        run: npm ci --no-workspaces

      - name: Typecheck
        working-directory: packages/runner
        run: npm run typecheck

      - name: Test
        working-directory: packages/runner
        run: npm test

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install Trigger.dev CLI
        run: npm install --global trigger.dev@latest

      # Server-side build (no --prebuilt). Vercel's local `vercel build`
      # had an unfixable `spawn npm ENOENT` from inside its install
      # subprocess (see runs #26449168750, #26449398708, #26450563874,
      # #26450973760). Letting Vercel's cloud handle the build sidesteps
      # the CLI bug.
      #
      # Depends on Vercel dashboard state:
      #   - "Ignored Build Step" = Automatic (NOT `exit 0` — that skips
      #     server-side builds too)
      #   - Git integration disconnected (otherwise git push auto-deploy
      #     races with this CI workflow)
      # Run from monorepo root, NOT packages/runner. The Vercel project's
      # rootDirectory setting is already "packages/runner" (per
      # .vercel/project.json), so Vercel will descend into packages/runner
      # on its own. Combining working-directory: packages/runner with
      # rootDirectory: packages/runner produces a doubled path
      # `packages/runner/packages/runner` that doesn't exist.
      - name: Deploy Vercel webhook (production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel deploy --prod --token="$VERCEL_TOKEN"

      - name: Deploy trigger.dev worker (production)
        working-directory: packages/runner
        env:
          TRIGGER_ACCESS_TOKEN: ${{ secrets.TRIGGER_ACCESS_TOKEN }}
        run: trigger deploy --env prod --skip-update-check
